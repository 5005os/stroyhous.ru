<style>
  :root{--bg:#0a0a0b;--surface:#161618;--surface2:#1f1f23;--border:#2a2a30;--accent:#f97316;--accent-dark:#ea580c;--text:#f5f5f4;--muted:#8a8a93;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);padding-bottom:90px;min-height:100vh;}
  .container{max-width:1100px;margin:0 auto;padding:0 16px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:24px 0 16px;}
  .logo{font-size:34px;font-weight:800;letter-spacing:-1px;}
  .logo span{color:var(--accent);}
  .login-btn{padding:11px 18px;border-radius:14px;background:var(--surface2);border:none;cursor:pointer;color:var(--text);font-family:inherit;font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;}
  .login-btn.logged{color:var(--accent);}
  .cats{display:flex;gap:10px;overflow-x:auto;padding:8px 0 16px;scrollbar-width:none;}
  .cats::-webkit-scrollbar{display:none;}
  .cat{flex-shrink:0;padding:13px 22px;border-radius:16px;background:var(--surface2);border:none;cursor:pointer;color:var(--text);font-size:15px;font-weight:600;font-family:inherit;white-space:nowrap;transition:.15s;}
  .cat.active{background:var(--accent);color:#fff;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  @media(min-width:700px){.grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:980px){.grid{grid-template-columns:repeat(4,1fr);}}
  .card{background:var(--surface);border-radius:20px;padding:12px;display:flex;flex-direction:column;cursor:pointer;transition:.15s;border:1px solid transparent;}
  .card:active{transform:scale(.98);}
  .card-img{background:var(--surface2);border-radius:14px;height:150px;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative;margin-bottom:10px;overflow:hidden;}
  .card-img img{width:100%;height:100%;object-fit:cover;}
  .badge{position:absolute;top:10px;left:10px;padding:5px 11px;border-radius:10px;font-size:12px;font-weight:700;color:#fff;}
  .badge.discount{background:var(--red);}.badge.new{background:var(--blue);}.badge.hit{background:var(--accent);}
  .fav{position:absolute;top:8px;right:8px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.45);border:none;cursor:pointer;color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;}
  .fav.active{color:var(--red);}
  .brand{font-size:13px;color:var(--muted);margin-bottom:2px;}
  .name{font-size:15px;font-weight:600;line-height:1.3;margin-bottom:4px;flex:1;}
  .weight{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .price-row{display:flex;justify-content:space-between;align-items:flex-end;}
  .price{font-size:19px;font-weight:800;color:var(--accent);}
  .old-price{font-size:13px;color:var(--muted);text-decoration:line-through;}
  .add-btn{width:42px;height:42px;border-radius:13px;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:24px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .add-btn:active{background:var(--accent-dark);}
  .bottomnav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--surface2);border-radius:24px;display:flex;gap:4px;padding:8px;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.5);}
  .nav-item{background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 14px;border-radius:16px;transition:.15s;position:relative;}
  .nav-item.active{background:var(--accent);color:#fff;}
  .nav-item svg{width:22px;height:22px;}
  .nav-badge{position:absolute;top:2px;right:8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
  .loading,.empty{text-align:center;padding:80px 20px;color:var(--muted);font-size:16px;}
  .spinner{width:40px;height:40px;border:4px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .section-title{font-size:22px;font-weight:800;margin:8px 0 16px;}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center;}
  .modal.open{display:flex;}
  .sheet{background:var(--bg);width:100%;max-width:600px;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto;animation:slideup .25s ease;}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-img{background:var(--surface);height:280px;display:flex;align-items:center;justify-content:center;font-size:120px;position:relative;overflow:hidden;}
  .sheet-img img{width:100%;height:100%;object-fit:cover;}
  .sheet-back{position:absolute;top:16px;left:16px;width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.5);border:none;cursor:pointer;color:#fff;font-size:20px;z-index:2;}
  .sheet-body{padding:24px;}
  .sheet-brand{color:var(--muted);font-size:15px;}
  .sheet-name{font-size:26px;font-weight:800;margin:4px 0 16px;line-height:1.2;}
  .sheet-price{font-size:32px;font-weight:800;color:var(--accent);}
  .sheet-stock{display:flex;align-items:center;gap:8px;margin:16px 0;color:var(--text);font-weight:600;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--green);}
  .divider{height:1px;background:var(--border);margin:18px 0;}
  .sheet-h{font-size:19px;font-weight:700;margin-bottom:8px;}
  .sheet-desc{color:var(--muted);line-height:1.6;}
  .delivery-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;}
  .delivery-row .left{display:flex;align-items:center;gap:12px;font-weight:600;}
  .delivery-row .ico{font-size:22px;}
  .free{color:var(--green);font-weight:700;}
  .cart-item{display:flex;gap:14px;background:var(--surface);border-radius:18px;padding:12px;margin-bottom:12px;align-items:center;}
  .cart-emoji{width:64px;height:64px;background:var(--surface2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;overflow:hidden;}
  .cart-emoji img{width:100%;height:100%;object-fit:cover;}
  .cart-info{flex:1;}
  .cart-info .n{font-weight:600;font-size:15px;}
  .cart-info .p{color:var(--accent);font-weight:800;margin-top:4px;}
  .cart-info .w{color:var(--muted);font-size:12px;}
  .qty{display:flex;align-items:center;gap:10px;}
  .qty button{width:32px;height:32px;border-radius:9px;border:none;background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;}
  .qty span{min-width:22px;text-align:center;font-weight:700;}
  .cart-total{background:var(--surface);border-radius:18px;padding:20px;margin:18px 0;}
  .ct-row{display:flex;justify-content:space-between;margin-bottom:10px;color:var(--muted);}
  .ct-row.big{color:var(--text);font-size:20px;font-weight:800;margin-bottom:0;padding-top:10px;border-top:1px solid var(--border);}
  .checkout-btn{width:100%;padding:18px;border-radius:16px;background:var(--accent);border:none;color:#fff;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px;}
  .checkout-btn:active{background:var(--accent-dark);}
  .ship-options{display:flex;flex-direction:column;gap:10px;margin:14px 0;}
  .ship-opt{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--surface);border:2px solid var(--border);border-radius:14px;cursor:pointer;font-weight:600;}
  .ship-opt.sel{border-color:var(--accent);}
  .ship-opt .l{display:flex;align-items:center;gap:10px;}
  .field{width:100%;padding:15px;border-radius:14px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:16px;font-family:inherit;margin-bottom:12px;}
  #map{width:100%;height:260px;border-radius:16px;margin:12px 0;background:var(--surface2);overflow:hidden;}
  .map-fallback{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;padding:20px;}
  .hidden{display:none!important;}
  .info-card{background:var(--surface);border-radius:18px;padding:20px;}
  .otp-inputs{display:flex;gap:10px;justify-content:center;margin:20px 0;}
  .otp-inputs input{width:48px;height:58px;text-align:center;font-size:24px;font-weight:700;border-radius:12px;background:var(--surface);border:2px solid var(--border);color:var(--text);}
  .otp-inputs input:focus{border-color:var(--accent);outline:none;}
  .profile-hero{text-align:center;padding:50px 24px;}
  .profile-hero .ava{width:90px;height:90px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 18px;}
</style>
</head>
<body>

  <div id="view-catalog">
    <div class="topbar">
      <div class="logo">Stroy<span>Hous</span></div>
      <button class="login-btn" id="login-chip" onclick="openLogin()">👤 Войти</button>

  <div id="view-search" class="hidden"><h2 class="section-title" style="margin-top:24px;">Поиск</h2><input id="search-input" class="field" placeholder="Что ищете?" oninput="doSearch()"><div id="search-results"></div></div>

        <button onclick="closeLogin()" style="background:var(--surface2);border:none;width:40px;height:40px;border-radius:50%;color:var(--text);font-size:18px;cursor:pointer;">✕</button>

<script>
  let allProducts=[], cart={}, favorites={}, currentCat='Все', sortAsc=true;
  let user=JSON.parse(localStorage.getItem('sh_user')||'null');
  let pendingPhone='', genCode='', deliveryKm=null, deliveryAddr='', currentShip='pickup', ymap=null;

  const SHOP={lat:55.5022, lon:37.5575, name:'StroyHous, Симферопольское шоссе 17А'};
  const PRICE_PER_KM=30, PRICE_PER_KG=30;
  const categories=['Все','Инструменты','Материалы','Сантехника','Отделка','Электрика'];
  const emojiByCat={'Инструменты':'🔧','Материалы':'🧱','Сантехника':'🚿','Отделка':'🎨','Электрика':'💡'};

  function loadProducts(){
    db.collection('products').get().then(snap=>{allProducts=snap.docs.map(d=>({id:d.id,...d.data()}));renderCats();renderProducts();})
    .catch(err=>{document.getElementById('products').innerHTML='<div class="empty">Не удалось загрузить товары.<br>Обновите страницу.</div>';console.error(err);});
  }
  function renderCats(){document.getElementById('cats').innerHTML=categories.map(c=>`<button class="cat ${c===currentCat?'active':''}" onclick="selectCat('${c}')">${emojiByCat[c]?emojiByCat[c]+' ':''}${c}</button>`).join('');}
  function selectCat(c){currentCat=c;renderCats();renderProducts();}
  function imgOrEmoji(p,big){if(p.img)return `<img src="${p.img}" alt="">`;return p.emoji||emojiByCat[p.category]||'📦';}
  function emojiFor(p){return p.emoji||emojiByCat[p.category]||'📦';}
  function fmt(n){return (Math.round(n)||0).toLocaleString('ru-RU');}
  function weightText(p){return p.weight?`Вес: ${p.weight} кг`:'';}
  function renderProducts(){
    let list=allProducts.filter(p=>currentCat==='Все'||p.category===currentCat);
    list.sort((a,b)=>sortAsc?(a.price||0)-(b.price||0):(b.price||0)-(a.price||0));
    const el=document.getElementById('products');
    el.innerHTML=list.length?'<div class="grid">'+list.map(cardHTML).join('')+'</div>':'<div class="empty">В этой категории пока нет товаров</div>';
  }
  function cardHTML(p){
    const fav=favorites[p.id]?'active':'';
    const w=weightText(p)?`<div class="weight">${weightText(p)}</div>`:'';
    return `<div class="card" onclick="openDetail('${p.id}')"><div class="card-img"><button class="fav ${fav}" onclick="event.stopPropagation();toggleFav('${p.id}')">♥</button>${imgOrEmoji(p)}</div><div class="brand">${p.category||''}</div><div class="name">${p.name||''}</div>${w}<div class="price-row"><div><div class="price">${fmt(p.price)} ₽</div></div><button class="add-btn" onclick="event.stopPropagation();addToCart('${p.id}')">+</button></div></div>`;
  }
  function openDetail(id){
    const p=allProducts.find(x=>x.id===id);if(!p)return;
    const w=p.weight?`<div class="delivery-row"><div class="left"><span class="ico">⚖️</span> Вес</div><span>${p.weight} кг</span></div>`:'';
    document.getElementById('sheet-content').innerHTML=`<div class="sheet-img"><button class="sheet-back" onclick="closeDetail()">←</button>${imgOrEmoji(p,true)}</div><div class="sheet-body"><div class="sheet-brand">${p.category||''}</div><div class="sheet-name">${p.name||''}</div><div style="display:flex;align-items:center;gap:14px;"><span class="sheet-price">${fmt(p.price)} ₽</span></div><div class="sheet-stock"><span class="dot"></span> В наличии${p.inStock!=null?': '+p.inStock+' шт':''}</div><div class="divider"></div><div class="sheet-h">Описание</div><div class="sheet-desc">${p.description||'Описание появится позже.'}</div><div class="divider"></div><div class="sheet-h">Доставка</div>${w}<div class="delivery-row"><div class="left"><span class="ico">🏪</span> Самовывоз</div><span class="free">Бесплатно</span></div><div class="delivery-row"><div class="left"><span class="ico">🚚</span> Курьер</div><span>30 ₽/км + 30 ₽/кг</span></div><button class="checkout-btn" style="margin-top:20px;" onclick="addToCart('${p.id}');closeDetail();switchView('cart');">🛒 В корзину</button></div>`;
    document.getElementById('detail-modal').classList.add('open');
  }
  function closeDetail(){document.getElementById('detail-modal').classList.remove('open');}
  document.getElementById('detail-modal').addEventListener('click',e=>{if(e.target.id==='detail-modal')closeDetail();});
  function toggleFav(id){if(favorites[id])delete favorites[id];else favorites[id]=true;renderProducts();if(!document.getElementById('view-fav').classList.contains('hidden'))renderFav();}
  function renderFav(){const list=allProducts.filter(p=>favorites[p.id]);const el=document.getElementById('fav-list');el.innerHTML=list.length?'<div class="grid">'+list.map(cardHTML).join('')+'</div>':'<div class="empty">Вы пока ничего не добавили в избранное ♥</div>';}
  function addToCart(id){cart[id]=(cart[id]||0)+1;updateBadge();flash();}
  function changeQty(id,d){cart[id]=(cart[id]||0)+d;if(cart[id]<=0)delete cart[id];updateBadge();renderCart();}
  function updateBadge(){const n=Object.values(cart).reduce((a,b)=>a+b,0);const b=document.getElementById('cart-badge');if(n>0){b.textContent=n;b.classList.remove('hidden');}else b.classList.add('hidden');}
  function flash(){const b=document.getElementById('cart-badge');b.style.transform='scale(1.4)';setTimeout(()=>b.style.transform='scale(1)',150);}
  function cartSum(){return Object.entries(cart).reduce((s,[id,q])=>{const p=allProducts.find(x=>x.id===id);return s+(p?p.price*q:0);},0);}
  function cartWeight(){return Object.entries(cart).reduce((s,[id,q])=>{const p=allProducts.find(x=>x.id===id);return s+(p&&p.weight?p.weight*q:0);},0);}
  function calcDelivery(){
    const weight=cartWeight();
    if(deliveryKm===null)return null;
    const km=Math.ceil(deliveryKm);
    const kg=Math.ceil(weight);
    const price=km*PRICE_PER_KM + kg*PRICE_PER_KG;
    return{price,free:false,km,kg,weight};
  }
  function renderCart(){
    const el=document.getElementById('cart-list');const ids=Object.keys(cart);
    if(!ids.length){el.innerHTML='<div class="empty">Корзина пуста 🛒<br>Добавьте товары из каталога</div>';return;}
    let html=ids.map(id=>{const p=allProducts.find(x=>x.id===id);if(!p)return'';const w=p.weight?`<div class="w">${p.weight} кг × ${cart[id]} = ${(p.weight*cart[id]).toFixed(1)} кг</div>`:'';return `<div class="cart-item"><div class="cart-emoji">${imgOrEmoji(p)}</div><div class="cart-info"><div class="n">${p.name}</div><div class="p">${fmt(p.price)} ₽</div>${w}</div><div class="qty"><button onclick="changeQty('${id}',-1)">−</button><span>${cart[id]}</span><button onclick="changeQty('${id}',1)">+</button></div></div>`;}).join('');
    html+=`<div class="sheet-h" style="margin-top:8px;">Способ получения</div><div class="ship-options"><label class="ship-opt sel" data-ship="pickup"><span class="l">🏪 Самовывоз</span><span class="free">Бесплатно</span></label><label class="ship-opt" data-ship="courier"><span class="l">🚚 Курьером</span><span id="courier-price">30 ₽/км + 30 ₽/кг</span></label></div>`;
    html+=`<div id="courier-block" class="hidden"><div class="sheet-h">Адрес доставки</div><input id="addr-input" class="field" placeholder="Город, улица, дом"><button class="checkout-btn" style="background:var(--surface2);margin-bottom:8px;" onclick="calcAddress()">📍 Рассчитать доставку</button><div id="map"><div class="map-fallback">Карта появится после расчёта адреса</div></div><div id="delivery-info"></div></div>`;
    html+=`<div class="cart-total" id="cart-total"></div><button class="checkout-btn" id="checkout-btn" onclick="checkout()">Оформить заказ</button>`;
    el.innerHTML=html;bindShipOptions();updateTotals();
  }
  function bindShipOptions(){
    document.querySelectorAll('.ship-opt').forEach(opt=>{opt.addEventListener('click',()=>{document.querySelectorAll('.ship-opt').forEach(o=>o.classList.remove('sel'));opt.classList.add('sel');currentShip=opt.dataset.ship;document.getElementById('courier-block').classList.toggle('hidden',currentShip!=='courier');updateTotals();});});
  }
  function updateTotals(){
    const sum=cartSum();let deliveryPrice=0,deliveryLabel='<span class="free">Бесплатно</span>';
    if(currentShip==='courier'){const d=calcDelivery();if(d===null){deliveryLabel='введите адрес';deliveryPrice=0;}else{deliveryPrice=d.price;deliveryLabel=fmt(d.price)+' ₽';}}
    const tot=document.getElementById('cart-total');
    if(tot)tot.innerHTML=`<div class="ct-row"><span>Товары (${Object.values(cart).reduce((a,b)=>a+b,0)} шт)</span><span>${fmt(sum)} ₽</span></div><div class="ct-row"><span>Общий вес</span><span>${cartWeight().toFixed(1)} кг</span></div><div class="ct-row"><span>Доставка</span><span>${deliveryLabel}</span></div><div class="ct-row big"><span>Итого</span><span>${fmt(sum+deliveryPrice)} ₽</span></div>`;
    const cb=document.getElementById('checkout-btn');if(cb)cb.textContent=`Оформить заказ — ${fmt(sum+deliveryPrice)} ₽`;
  }
  function calcAddress(){
    const addr=document.getElementById('addr-input').value.trim();
    if(!addr){alert('Введите адрес доставки');return;}
    deliveryAddr=addr;const info=document.getElementById('delivery-info');
    info.innerHTML='<div class="loading" style="padding:20px;"><div class="spinner"></div>Определяем адрес…</div>';
    if(typeof ymaps==='undefined'){info.innerHTML=`<div class="info-card" style="margin-top:10px;"><p style="color:var(--muted);margin-bottom:10px;">Карта недоступна. Укажите расстояние от магазина вручную (км):</p><input id="km-manual" class="field" type="number" placeholder="например 8" oninput="manualKm(this.value)"></div>`;return;}
    ymaps.ready(function(){
      ymaps.geocode(addr,{results:1}).then(function(res){
        const obj=res.geoObjects.get(0);
        if(!obj){info.innerHTML='<div class="empty" style="padding:20px;">Адрес не найден. Проверьте написание.</div>';return;}
        const coords=obj.geometry.getCoordinates();
        const dist=ymaps.coordSystem.geo.getDistance([SHOP.lat,SHOP.lon],coords)/1000;
        deliveryKm=dist;
        info.innerHTML='<div id="map" style="height:260px;"></div>';
        if(ymap)ymap.destroy();
        ymap=new ymaps.Map('map',{center:[(SHOP.lat+coords[0])/2,(SHOP.lon+coords[1])/2],zoom:10,controls:['zoomControl']});
        ymap.geoObjects.add(new ymaps.Placemark([SHOP.lat,SHOP.lon],{balloonContent:'🏪 Магазин StroyHous'},{preset:'islands#redShopIcon'}));
        ymap.geoObjects.add(new ymaps.Placemark(coords,{balloonContent:'📍 Адрес доставки'},{preset:'islands#blueHomeIcon'}));
        ymap.geoObjects.add(new ymaps.Polyline([[SHOP.lat,SHOP.lon],coords],{},{strokeColor:'#f97316',strokeWidth:3,strokeStyle:'shortdash'}));
        const d=calcDelivery();
        const detail=`<p style="margin-top:12px;line-height:1.7;">Расстояние: <b>${dist.toFixed(1)} км</b> → <b>${d.km} км</b><br>Вес заказа: <b>${cartWeight().toFixed(1)} кг</b> → <b>${d.kg} кг</b><br>Расчёт: ${d.km}×30 + ${d.kg}×30<br><span class="price" style="font-size:22px;">Доставка: ${fmt(d.price)} ₽</span></p>`;
        info.insertAdjacentHTML('beforeend','<div class="info-card" style="margin-top:12px;">'+detail+'</div>');
        updateTotals();
      }).catch(function(e){console.error(e);info.innerHTML=`<div class="info-card"><p style="color:var(--muted);margin-bottom:10px;">Не удалось определить адрес. Укажите км вручную:</p><input id="km-manual" class="field" type="number" placeholder="км" oninput="manualKm(this.value)"></div>`;});
    });
  }
  function manualKm(v){deliveryKm=parseFloat(v)||null;updateTotals();}
  function doSearch(){
    const q=document.getElementById('search-input').value.toLowerCase().trim();const el=document.getElementById('search-results');
    if(!q){el.innerHTML='';return;}
    const list=allProducts.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q));
    el.innerHTML=list.length?'<div class="grid">'+list.map(cardHTML).join('')+'</div>':'<div class="empty">Ничего не найдено</div>';
  }
  function checkout(){
    if(!Object.keys(cart).length){alert('Корзина пуста');return;}
    if(!user){alert('Сначала войдите по номеру телефона');openLogin();return;}
    if(currentShip==='courier'&&deliveryKm===null){alert('Введите адрес доставки и нажмите «Рассчитать»');return;}
    const sum=cartSum();let dp=0;
    if(currentShip==='courier'){const d=calcDelivery();dp=d?d.price:0;}
    const shipName={pickup:'Самовывоз',courier:'Курьером'}[currentShip];
    const items=Object.entries(cart).map(([id,q])=>{const p=allProducts.find(x=>x.id===id);return{name:p?p.name:'',price:p?p.price:0,qty:q,emoji:p?emojiFor(p):'📦'};});
    const order={
      name:user.name||'',phone:user.phone,items:items,
      sum:sum,delivery:shipName,address:currentShip==='courier'?deliveryAddr:'',
      deliveryPrice:dp,total:sum+dp,status:'Принят',statusOrder:0,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    };
    const btn=document.getElementById('checkout-btn');
    if(btn){btn.disabled=true;btn.textContent='Оформляем…';}
    db.collection('orders').add(order).then(()=>{
      alert(`Заказ оформлен! ✅\n\n${user.name}, ${user.phone}\nПолучение: ${shipName}${currentShip==='courier'?', '+deliveryAddr:''}\nТоваров на: ${fmt(sum)} ₽\nДоставка: ${dp?fmt(dp)+' ₽':'бесплатно'}\nИТОГО: ${fmt(sum+dp)} ₽\n\nМы свяжемся с вами для подтверждения.`);
      cart={};deliveryKm=null;updateBadge();renderCart();
    }).catch(err=>{
      console.error(err);
      alert('Не удалось оформить заказ. Попробуйте ещё раз.');
      if(btn){btn.disabled=false;updateTotals();}
    });
  }
  function openLogin(){authMode='login';setAuthMode('login');backToPhone();document.getElementById('login-modal').classList.add('open');}
  function closeLogin(){document.getElementById('login-modal').classList.remove('open');}
  document.getElementById('login-modal').addEventListener('click',e=>{if(e.target.id==='login-modal')closeLogin();});
  let authMode='login', pendingName='';
  function setAuthMode(mode){
    authMode=mode;
    const isReg=mode==='reg';
    document.getElementById('reg-name-wrap').classList.toggle('hidden',!isReg);
    document.getElementById('login-title').textContent=isReg?'Регистрация':'Вход';
    document.getElementById('tab-login').style.background=isReg?'transparent':'var(--accent)';
    document.getElementById('tab-reg').style.background=isReg?'var(--accent)':'transparent';
    document.getElementById('send-code-btn').textContent='Получить код';
  }
  function sendCode(){
    const phone=document.getElementById('phone-input').value.trim();
    if(phone.replace(/\D/g,'').length<11){alert('Введите корректный номер телефона');return;}
    if(authMode==='reg'){
      const name=document.getElementById('name-input').value.trim();
      if(!name){alert('Введите ваше имя');return;}
      pendingName=name;proceedCode(phone);
    } else {
      const btn=document.getElementById('send-code-btn');btn.disabled=true;btn.textContent='Проверяем…';
      db.collection('users').doc(phone.replace(/\D/g,'')).get().then(doc=>{
        btn.disabled=false;btn.textContent='Получить код';
        if(doc.exists){pendingName=doc.data().name||'';proceedCode(phone);}
        else{alert('Этот номер не зарегистрирован.\nПерейдите на вкладку «Регистрация».');setAuthMode('reg');document.getElementById('phone-input').value=phone;}
      }).catch(err=>{btn.disabled=false;btn.textContent='Получить код';console.error(err);pendingName='';proceedCode(phone);});
    }
  }
  function proceedCode(phone){
    pendingPhone=phone;genCode=String(Math.floor(1000+Math.random()*9000));
    document.getElementById('phone-display').textContent=phone;
    document.getElementById('auth-tabs').classList.add('hidden');
    document.getElementById('login-step-phone').classList.add('hidden');
    document.getElementById('login-step-code').classList.remove('hidden');
    setTimeout(()=>alert('Ваш код: '+genCode+'\n\n(Временно — реальные SMS подключим через сервер)'),300);
    document.querySelectorAll('#login-step-code .otp-inputs input')[0].focus();
  }
  function otpMove(inp,i){const f=document.querySelectorAll('#login-step-code .otp-inputs input');if(inp.value&&i<3)f[i+1].focus();if([...f].every(x=>x.value))verifyCode();}
  function verifyCode(){
    const f=document.querySelectorAll('#login-step-code .otp-inputs input');const code=[...f].map(x=>x.value).join('');
    if(code!==genCode){alert('Неверный код');return;}
    user={name:pendingName,phone:pendingPhone};
    localStorage.setItem('sh_user',JSON.stringify(user));
    if(authMode==='reg'){db.collection('users').doc(pendingPhone.replace(/\D/g,'')).set({name:pendingName,phone:pendingPhone}).catch(e=>console.error(e));}
    closeLogin();updateProfile();
    alert((authMode==='reg'?'Регистрация завершена! ✅':'Вы вошли! ✅')+'\n'+pendingName);
  }
  function backToPhone(){
    document.getElementById('login-step-code').classList.add('hidden');
    document.getElementById('login-step-phone').classList.remove('hidden');
    document.getElementById('auth-tabs').classList.remove('hidden');
    document.querySelectorAll('#login-step-code .otp-inputs input').forEach(x=>x.value='');
  }
  function logout(){user=null;localStorage.removeItem('sh_user');updateLoginChip();updateProfile();}
  function updateLoginChip(){
    const chip=document.getElementById('login-chip');
    if(user){chip.textContent='👤 '+(user.name||user.phone);chip.classList.add('logged');chip.onclick=()=>switchView('profile');}
    else{chip.textContent='👤 Войти';chip.classList.remove('logged');chip.onclick=openLogin;}
  }
  const STATUS_STEPS=['Принят','Собирается','Собран','Готов'];
  const STATUS_DELIVERY=['Принят','Сборка','Едет по адресу','Доставлен'];
  function updateProfile(){
    updateLoginChip();
    const el=document.getElementById('profile-content');
    if(!user){
      el.innerHTML=`<div class="profile-hero"><div class="ava">👤</div><h2 style="font-size:24px;font-weight:800;margin-bottom:8px;">Вход в профиль</h2><p style="color:var(--muted);margin-bottom:24px;">Войдите, чтобы делать заказы<br>и отслеживать их статус</p><button class="checkout-btn" style="max-width:280px;margin:0 auto;" onclick="openLogin()">Войти по номеру</button></div>`;
      return;
    }
    el.innerHTML=`<div style="padding-top:24px;"><div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;"><div class="ava" style="margin:0;">👤</div><div><div style="font-size:22px;font-weight:800;">${user.name||''}</div><div style="color:var(--muted);">${user.phone}</div></div></div><button class="checkout-btn" onclick="showMyOrders()">📦 Мои заказы</button><button class="checkout-btn" style="background:var(--surface2);margin-top:10px;" onclick="logout()">Выйти</button><div id="my-orders" style="margin-top:20px;"></div></div>`;
  }
  function showMyOrders(){
    const box=document.getElementById('my-orders');if(!box||!user)return;
    box.innerHTML='<div class="loading" style="padding:30px;"><div class="spinner"></div>Загрузка заказов…</div>';
    db.collection('orders').where('phone','==',user.phone).get().then(snap=>{
      let orders=snap.docs.map(d=>({id:d.id,...d.data()}));
      orders.sort((a,b)=>{const ta=a.createdAt&&a.createdAt.seconds?a.createdAt.seconds:0;const tb=b.createdAt&&b.createdAt.seconds?b.createdAt.seconds:0;return tb-ta;});
      if(!orders.length){box.innerHTML='<div class="empty" style="padding:30px;">У вас пока нет заказов</div>';return;}
      box.innerHTML=orders.map(o=>{
        const isDelivery=o.delivery&&o.delivery.indexOf('урьер')>=0;
        const steps=isDelivery?STATUS_DELIVERY:STATUS_STEPS;
        const step=o.statusOrder||0;
        const dt=o.createdAt&&o.createdAt.seconds?new Date(o.createdAt.seconds*1000).toLocaleString('ru-RU',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'}):'';
        const itemsList=(o.items||[]).map(it=>`${it.emoji||'📦'} ${it.name} × ${it.qty}`).join('<br>');
        const stepsHtml=steps.map((s,i)=>`<div style="flex:1;text-align:center;"><div style="width:24px;height:24px;border-radius:50%;margin:0 auto 4px;background:${i<=step?'var(--accent)':'var(--surface2)'};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">${i<=step?'✓':i+1}</div><div style="font-size:10px;color:${i<=step?'var(--accent)':'var(--muted)'};">${s}</div></div>`).join('<div style="flex:0.3;height:2px;background:var(--border);margin-top:11px;"></div>');
        return `<div class="info-card" style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span style="color:var(--muted);font-size:13px;">${dt}</span><span class="price">${fmt(o.total)} ₽</span></div><div style="color:var(--text);line-height:1.6;margin-bottom:14px;">${itemsList}</div><div style="color:var(--muted);font-size:13px;margin-bottom:14px;">${isDelivery?'🚚 '+(o.address||''):'🏪 Самовывоз'}</div><div style="display:flex;align-items:flex-start;">${stepsHtml}</div></div>`;
      }).join('');
    }).catch(err=>{console.error(err);box.innerHTML='<div class="empty" style="padding:30px;">Не удалось загрузить заказы</div>';});
  }
  function switchView(v){
    ['catalog','search','cart','fav','profile'].forEach(n=>document.getElementById('view-'+n).classList.toggle('hidden',n!==v));
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
    if(v==='cart')renderCart();if(v==='fav')renderFav();if(v==='profile')updateProfile();
    window.scrollTo(0,0);
  }
  loadProducts();updateLoginChip();
</script>
</body>
</html>
