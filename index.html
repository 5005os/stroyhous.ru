<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StroyHous — Стройматериалы</title>
<script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0b;--surface:#161618;--surface2:#1f1f23;--border:#2a2a30;--accent:#f97316;--text:#f5f5f4;--muted:#8a8a93;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Manrope',sans-serif;}
  body{background:var(--bg);color:var(--text);padding-bottom:90px;}
  .container{max-width:1100px;margin:0 auto;padding:0 16px;}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:20px 0;}
  .logo{font-size:28px;font-weight:800;letter-spacing:-1px;}
  .logo span{color:var(--accent);}
  .auth-btn{background:var(--surface2);padding:8px 16px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;}

  .cats{display:flex;gap:10px;overflow-x:auto;padding-bottom:15px;scrollbar-width:none;}
  .cat{padding:8px 16px;background:var(--surface2);border-radius:20px;font-size:14px;white-space:nowrap;cursor:pointer;border:1px solid transparent;}
  .cat.active{background:var(--accent);color:#fff;border-color:var(--accent);}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;}
  @media(min-width:700px){.grid{grid-template-columns:repeat(4,1fr);}}
  .card{background:var(--surface);border-radius:16px;padding:12px;cursor:pointer;transition:0.2s;}
  .card:hover{transform:translateY(-3px);}
  .card-img{height:140px;background:var(--surface2);border-radius:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .card-img img{width:100%;height:100%;object-fit:cover;}
  .card-name{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:5px;height:36px;overflow:hidden;}
  .card-price{font-size:18px;font-weight:800;color:var(--accent);}

  .bottomnav{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);background:var(--surface2);border-radius:24px;display:flex;padding:8px;gap:5px;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
  .nav-item{background:none;border:none;color:var(--muted);font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;padding:8px 14px;border-radius:16px;cursor:pointer;position:relative;}
  .nav-item.active{background:var(--accent);color:#fff;}
  .nav-badge{position:absolute;top:0;right:8px;background:#ef4444;color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;display:none;align-items:flex-end;justify-content:center;}
  .modal.open{display:flex;}
  .sheet{background:var(--bg);width:100%;max-width:600px;border-radius:24px 24px 0 0;padding:24px;max-height:90vh;overflow-y:auto;animation:slideup 0.3s;}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .prod-detail-img{width:100%;height:250px;background:var(--surface2);border-radius:16px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .prod-detail-img img{width:100%;height:100%;object-fit:cover;}
  .btn-group{display:flex;gap:10px;margin-top:20px;}
  .btn{flex:1;padding:14px;border-radius:12px;border:none;font-weight:700;font-size:16px;cursor:pointer;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-secondary{background:var(--surface2);color:var(--text);}

  .field{width:100%;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:#fff;margin-bottom:15px;font-size:16px;}
  .cart-item{display:flex;justify-content:space-between;align-items:center;background:var(--surface);padding:12px;border-radius:12px;margin-bottom:10px;}
  #map{width:100%;height:250px;border-radius:12px;margin:10px 0;background:var(--surface2);}
  .total-box{background:var(--surface);padding:20px;border-radius:16px;margin-top:20px;}

  .hidden{display:none!important;}
</style>
</head>
<body>

<div class="container">
  <div id="view-catalog">
    <div class="topbar">
      <div class="logo">Stroy<span>Hous</span></div>
      <div class="auth-btn" onclick="switchView('profile')">👤 Профиль</div>
    </div>
    <div class="cats" id="cats-bar"></div>
    <div class="grid" id="products-grid"></div>
  </div>

  <div id="view-search" class="hidden">
    <div class="topbar"><h2>Поиск товаров</h2></div>
    <input id="search-input" class="field" placeholder="Например: Дрель..." oninput="doSearch()">
    <div class="grid" id="search-results"></div>
  </div>

  <div id="view-cart" class="hidden">
    <div class="topbar"><h2>Корзина</h2></div>
    <div id="cart-list"></div>
    <div id="checkout-form" class="hidden">
      <select id="ship-type" class="field" onchange="toggleMap()">
        <option value="pickup">Самовывоз (бесплатно)</option>
        <option value="delivery">Доставка курьером</option>
      </select>

      <!-- БЛОК С АДРЕСОМ И КАРТОЙ -->
      <div id="map-block" class="hidden">
        <label style="display:block;margin-bottom:5px;color:var(--muted);font-size:13px;">Введите адрес или выберите точку на карте:</label>
        <input id="addr-inp" class="field" placeholder="Улица, дом, квартира..." oninput="geocode(this.value)">
        <div id="map"></div>
        <div id="calc-info" style="font-size:13px;color:var(--muted);margin-bottom:10px;"></div>
      </div>

      <div class="total-box">
        <div style="display:flex;justify-content:space-between;font-size:20px;font-weight:800;">
          <span>Итого:</span><span id="final-sum">0 ₽</span>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:15px;" onclick="submitOrder()">Оформить заказ</button>
      </div>
    </div>
  </div>

  <div id="view-profile" class="hidden">
    <div class="topbar"><h2>Профиль</h2></div>
    <div id="profile-content"></div>
  </div>
</div>

<div class="modal" id="prod-modal">
  <div class="sheet">
    <div class="prod-detail-img" id="detail-img"></div>
    <h2 id="detail-name" style="margin-bottom:5px;"></h2>
    <div id="detail-price" style="font-size:24px;font-weight:800;color:var(--accent);margin-bottom:15px;"></div>
    <p id="detail-desc" style="color:var(--muted);line-height:1.6;margin-bottom:20px;"></p>
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="addToCartFromModal()">В корзину</button>
      <button class="btn btn-primary" onclick="buyNow()">Купить сейчас</button>
    </div>
    <button style="width:100%;margin-top:15px;background:none;border:none;color:var(--muted);padding:10px;" onclick="closeModal()">Закрыть</button>
  </div>
</div>

<nav class="bottomnav">
  <button class="nav-item active" data-view="catalog" onclick="switchView('catalog')"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/></svg>Главная</button>
  <button class="nav-item" data-view="search" onclick="switchView('search')"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Поиск</button>
  <button class="nav-item" data-view="cart" onclick="switchView('cart')"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.2 14h9.5c.7 0 1.3-.4 1.6-1l3.6-6.5L19.8 5l-3.3 6H8L4.3 2H1v2h2l3.6 7.6L5.2 15c-.3.5-.2 1.2.4 1.5.2.1.4.5 1.6.5z"/></svg>Корзина<span class="nav-badge hidden" id="cart-badge">0</span></button>
  <button class="nav-item" data-view="profile" onclick="switchView('profile')"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>Профиль</button>
</nav>

<script>
  let products=[], cart={}, user=JSON.parse(localStorage.getItem('sh_user')||'null');
  let currentProdId=null, deliveryKm=0, totalWeight=0, currentShip='pickup';
  const SHOP=[55.5022, 37.5575]; // Симферопольское ш., 17А
  let myMap, myPlacemark;

  function init(){
    fetch('/api/products').then(r=>r.json()).then(p=>{
      products=p; renderCats(); renderProducts(products);
    });
    updateUI();
  }

  function renderCats(){
    const cats=['Все',...new Set(products.map(p=>p.category))];
    document.getElementById('cats-bar').innerHTML=cats.map(c=>`<div class="cat ${c==='Все'?'active':''}" onclick="filterCat('${c}',this)">${c}</div>`).join('');
  }
  function filterCat(c,el){
    document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    renderProducts(c==='Все'?products:products.filter(p=>p.category===c));
  }
  function renderProducts(list, target='products-grid'){
    document.getElementById(target).innerHTML=list.length ? list.map(p=>`
      <div class="card" onclick="openDetail('${p.id}')">
        <div class="card-img">${p.img?`<img src="${p.img}">`:'📦'}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-price">${p.price} ₽</div>
      </div>
    `).join('') : '<div class="empty" style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Ничего не найдено</div>';
  }

  function openDetail(id){
    const p=products.find(x=>x.id===id); if(!p)return;
    currentProdId=id;
    document.getElementById('detail-img').innerHTML=p.img?`<img src="${p.img}">`:'📦';
    document.getElementById('detail-name').innerText=p.name;
    document.getElementById('detail-price').innerText=p.price+' ₽';
    document.getElementById('detail-desc').innerText=p.description||'Описание отсутствует';
    document.getElementById('prod-modal').classList.add('open');
  }
  function closeModal(){document.getElementById('prod-modal').classList.remove('open');}

  function addToCartFromModal(){
    if(currentProdId){cart[currentProdId]=(cart[currentProdId]||0)+1;updateBadge();closeModal();alert('Добавлено!');}
  }
  function buyNow(){
    if(currentProdId){
      cart[currentProdId]=(cart[currentProdId]||0)+1;
      updateBadge(); closeModal(); switchView('cart');
    }
  }

  function addToCart(id){cart[id]=(cart[id]||0)+1;updateBadge();}
  function updateBadge(){
    const n=Object.values(cart).reduce((a,b)=>a+b,0);
    const b=document.getElementById('cart-badge');
    b.textContent=n;b.classList.toggle('hidden',n===0);
  }

  function switchView(v){
    ['catalog','search','cart','profile'].forEach(n=>document.getElementById('view-'+n).classList.toggle('hidden',n!==v));
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
    if(v==='cart') renderCart();
    if(v==='profile') renderProfile();
  }

  function renderCart(){
    const list=document.getElementById('cart-list');
    const form=document.getElementById('checkout-form');
    const ids=Object.keys(cart);
    if(!ids.length){list.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Корзина пуста</div>';form.classList.add('hidden');return;}

    let html='', sum=0, w=0;
    ids.forEach(id=>{
      const p=products.find(x=>x.id===id);
      if(p){sum+=p.price*cart[id]; w+=(p.weight||0)*cart[id];
        html+=`<div class="cart-item"><div><b>${p.name}</b> x${cart[id]}</div><div>${p.price*cart[id]} ₽</div></div>`;}
    });
    totalWeight=w;
    list.innerHTML=html;
    form.classList.remove('hidden');
    calcTotal(sum);
  }

  function toggleMap(){
    currentShip=document.getElementById('ship-type').value;
    document.getElementById('map-block').classList.toggle('hidden',currentShip!=='delivery');
    if(currentShip==='delivery' && !myMap) initMap();
    calcTotal(getSum());
  }
  function getSum(){return Object.keys(cart).reduce((s,id)=>s+(products.find(x=>x.id===id)?.price*cart[id]||0),0);}

  function calcTotal(sum){
    let del=0;
    if(currentShip==='delivery') del=Math.ceil(deliveryKm*40 + totalWeight*30);
    document.getElementById('final-sum').innerText=(sum+del)+' ₽';
  }

  function initMap(){
    ymaps.ready(()=>{
      myMap=new ymaps.Map("map",{center:SHOP,zoom:11});
      myMap.events.add('click',e=>{
        const c=e.get('coords');
        if(myPlacemark)myPlacemark.geometry.setCoordinates(c);
        else{myPlacemark=new ymaps.Placemark(c);myMap.geoObjects.add(myPlacemark);}
        calcDist(c);
      });
    });
  }

  // Поиск адреса по тексту
  function geocode(addr){
    if(!addr || addr.length < 5) return;
    ymaps.geocode(addr).then(r=>{
      const o=r.geoObjects.get(0);
      if(o){
        const c=o.geometry.getCoordinates();
        myMap.setCenter(c, 14);
        if(myPlacemark) myPlacemark.geometry.setCoordinates(c);
        else {
            myPlacemark = new ymaps.Placemark(c);
            myMap.geoObjects.add(myPlacemark);
        }
        calcDist(c);
      }
    });
  }

  function calcDist(c){
    deliveryKm=ymaps.coordSystem.geo.getDistance(SHOP,c)/1000;
    document.getElementById('calc-info').innerText=`Расстояние: ${Math.ceil(deliveryKm)} км | Вес: ${totalWeight} кг`;
    calcTotal(getSum());
  }

  function doSearch(){
    const q=document.getElementById('search-input').value.toLowerCase();
    const res=products.filter(p=>p.name.toLowerCase().includes(q));
    renderProducts(res, 'search-results');
  }

  function submitOrder(){
    if(!user)return alert('Войдите в профиль!');

    // Проверка адреса при доставке
    let address = "Самовывоз";
    if(currentShip === 'delivery') {
        address = document.getElementById('addr-inp').value;
        if(!address || address.length < 5) return alert('Пожалуйста, введите адрес доставки!');
    }

    const order={
        name:user.name,
        phone:user.phone,
        items:Object.keys(cart).map(id=>({name:products.find(x=>x.id===id).name,qty:cart[id]})),
        total:parseInt(document.getElementById('final-sum').innerText),
        address: address
    };

    fetch('/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(order)}).then(r=>r.json()).then(d=>{
      alert('Заказ #'+d.order_id+' принят! Мы свяжемся с вами.');
      cart={};updateBadge();switchView('catalog');
    });
  }

  function renderProfile(){
    const el=document.getElementById('profile-content');
    if(user){
      el.innerHTML=`<div style="background:var(--surface);padding:20px;border-radius:16px;margin-bottom:20px;"><h3>${user.name}</h3><p style="color:var(--muted)">${user.phone}</p><button onclick="logout()" style="margin-top:10px;color:red;background:none;border:none;cursor:pointer;">Выйти</button></div><h3>Мои заказы</h3><div id="orders-list"></div>`;
      loadOrders();
    } else {
      el.innerHTML=`<div style="text-align:center;padding:40px;"><h3>Вход</h3><input id="phone-inp" class="field" placeholder="+7..." style="margin-top:20px;"><button class="btn btn-primary" onclick="login()">Войти</button></div>`;
    }
  }
  function login(){
    const p=document.getElementById('phone-inp').value;
    if(p){user={phone:p,name:'Клиент'};localStorage.setItem('sh_user',JSON.stringify(user));renderProfile();updateUI();}
  }
  function logout(){user=null;localStorage.removeItem('sh_user');renderProfile();updateUI();}
  function updateUI(){document.querySelector('.auth-btn').innerText=user?'👤 '+user.name:'👤 Войти';}
  function loadOrders(){
    fetch('/api/orders').then(r=>r.json()).then(orders=>{
      const my=orders.filter(o=>o.phone===user.phone);
      document.getElementById('orders-list').innerHTML=my.length?my.map(o=>`<div style="background:var(--surface);padding:15px;border-radius:12px;margin-bottom:10px;"><div style="display:flex;justify-content:space-between;"><b>#${o.id}</b><span>${o.total}₽</span></div><div style="font-size:12px;color:var(--muted);margin-top:5px;">${o.status} • ${o.date}</div></div>`).join(''):'Нет заказов';
    });
  }

  init();
</script>
</body>
</html>
